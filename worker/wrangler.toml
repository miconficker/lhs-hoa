name = "laguna-hills-hoa-worker"
compatibility_date = "2024-01-01"
main = "src/index.ts"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "laguna_hills_hoa"
database_id = "f7542e2f-7602-41d9-87a5-e2670dc1853e"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "lhs-hoa-documents"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://lhs-hoa.pages.dev"
GOOGLE_REDIRECT_URI = "https://lhs-hoa.pages.dev/api/auth/google/callback"

# Local development with remote D1
[env.development]
[[env.development.d1_databases]]
binding = "DB"
database_name = "laguna_hills_hoa"
database_id = "f7542e2f-7602-41d9-87a5-e2670dc1853e"
remote = true

[[env.development.r2_buckets]]
binding = "R2"
bucket_name = "lhs-hoa-documents"

[env.development.vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:8788"
GOOGLE_REDIRECT_URI = "http://localhost:5173/api/auth/google/callback"
